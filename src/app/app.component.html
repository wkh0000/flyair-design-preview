<!-- Public preview banner — only renders in the static GitHub Pages build (environment.demo.ts) -->
<div class="fly-demo-banner" *ngIf="bannerVisible" role="note" aria-label="Design preview notice">
  <span class="fly-demo-dot" aria-hidden="true"></span>
  <span class="fly-demo-text"><b>Design preview</b> — live booking, payments and admin actions are disabled in this preview. Full functionality is available in the production build.</span>
  <button type="button" class="fly-demo-close" (click)="closeBanner()" aria-label="Dismiss design preview banner">&times;</button>
</div>

<!-- Skip-to-content link — first focusable element, visible only on focus (WCAG 2.4.1 Bypass Blocks) -->
<a class="fly-skip-link" href="#main-content">Skip to main content</a>
<div class="fly-loading-overlay" *ngIf="loader.loading$ | async" role="status" aria-live="polite">
  <app-loader></app-loader>
  <p class="fly-loading-text">Searching the sky for your best fares…</p>
</div>
<app-header *ngIf="!(isAdminRoute$ | async)"></app-header>
<main id="main-content" tabindex="-1">
  <router-outlet></router-outlet>
</main>
