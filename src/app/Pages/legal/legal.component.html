<div class="fly" *ngIf="doc">
  <section class="subhero">
    <div class="orb"></div>
    <div class="fly-container">
      <div class="fly-eyebrow" style="color:#9fd0ff">{{ doc.eyebrow }}</div>
      <h1>{{ doc.title }}</h1>
      <p class="fly-lead">{{ doc.intro }}</p>
      <p class="upd" *ngIf="doc.updated">Last updated: {{ doc.updated | date:'d MMMM y' }}</p>
    </div>
  </section>

  <figure class="hero-image" *ngIf="doc.heroImage">
    <img [src]="doc.heroImage" [alt]="doc.heroImageAlt || ''" loading="lazy" />
  </figure>

  <section class="fly-section">
    <div class="fly-container body">
      <!-- Anchor table of contents — collapsible "On this page" for longer docs. -->
      <details class="fly-toc" *ngIf="doc.sections && doc.sections.length > 3">
        <summary>On this page</summary>
        <ol>
          <li *ngFor="let s of doc.sections; let i = index">
            <a [href]="'#sec-' + i">{{ s.h }}</a>
          </li>
        </ol>
      </details>

      <div class="sec" *ngFor="let s of doc.sections; let i = index" [id]="'sec-' + i">
        <h3>{{ i + 1 }}. {{ s.h }}</h3>
        <p>{{ s.p }}</p>
      </div>

      <div class="links" *ngIf="doc.legalLinks">
        <a routerLink="/privacy" [class.active]="page==='privacy'">Privacy</a>
        <a routerLink="/terms" [class.active]="page==='terms'">Terms</a>
        <a routerLink="/cookies" [class.active]="page==='cookies'">Cookies</a>
      </div>
    </div>
  </section>

  <!-- Shared "promotions + news + partners" footer widget. Same widget that
       sits under news/promo-detail pages — keeps the site feeling unified. -->
  <app-page-footer-widgets></app-page-footer-widgets>
</div>
