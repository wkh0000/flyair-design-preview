<div class="share-bar" role="group" aria-label="Share this article">
  <span class="share-bar__label" aria-hidden="true">Share</span>

  <ul class="share-bar__list">
    <li *ngFor="let t of targets">
      <a
        class="share-bar__btn"
        [attr.data-net]="t.key"
        [href]="t.href"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="t.label"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <path [attr.d]="t.icon" fill="currentColor" />
        </svg>
      </a>
    </li>

    <li>
      <button type="button" class="share-bar__btn share-bar__copy" (click)="copyLink()"
              [attr.aria-label]="copied ? 'Link copied to clipboard' : 'Copy link to clipboard'">
        <svg *ngIf="!copied" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M3.9 12a3.1 3.1 0 0 1 3.1-3.1h4V7h-4a5 5 0 0 0 0 10h4v-1.9h-4A3.1 3.1 0 0 1 3.9 12zm4.1 1h8v-2H8v2zm5-6h4a5 5 0 0 1 0 10h-4v-1.9h4a3.1 3.1 0 0 0 0-6.2h-4V7z"/>
        </svg>
        <svg *ngIf="copied" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/>
        </svg>
      </button>
    </li>
  </ul>

  <span class="share-bar__status" role="status" aria-live="polite">
    {{ copied ? 'Link copied' : '' }}
  </span>
</div>
