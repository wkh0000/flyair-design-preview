<div class="sidebar">
  <h4>Filters</h4>
  <mat-divider></mat-divider>

  <div *ngIf="filterOptions.airlines?.length > 0" class="mb-3">
    <div class="section mb-3 mt-3">
      <span class="transfers">Airlines</span>
    </div>

    <div *ngIf="isAirLoading" class="loading-spinner">
      <mat-spinner diameter="30"></mat-spinner>
    </div>
    <div *ngIf="!isAirLoading">
      <div *ngFor="let airline of filterOptions.airlines">
        <div
          class="form-check"
          style="display: flex; align-items: center; gap: 15px"
        >
        <mat-checkbox
        style="float: left; margin-left: -1.5em;"
        [checked]="selectedFilters.airlines.includes(airline)"
        (change)="onFilterChange('airlines', airline, $event)"
        [value]="airline"
        id="{{ airline }}"
      >

      </mat-checkbox>
      <img
      [src]="getAirlineLogoUrl(extractIataCode(airline), airline)"
      alt="Airline Logo"
      class="airline-logo"
    />
        </div>
      </div>
    </div>
  </div>

  <mat-divider></mat-divider>
  <div *ngIf="filterOptions.layoverDestinations?.length > 0" class="mb-3">
    <div class="section mb-3 mt-3">
      <span class="transfers">Layover</span>
    </div>

    <div *ngIf="isLayLoading" class="loading-spinner">
      <mat-spinner diameter="30"></mat-spinner>
    </div>
    <div *ngIf="!isLayLoading">
      <div *ngFor="let count of filterOptions.layoverCounts">
        <div class="form-check" style="display: flex; align-items: center; gap: 15px">
          <mat-checkbox
          style="float: left; margin-left: -1.5em;"
          [checked]="selectedFilters.layoverCounts.includes(count)"
          (change)="onFilterChange('layoverCounts', count, $event)"
          [value]="count"
          id="{{ count }}"
        >
        </mat-checkbox>
        <label style="font-size: 14px;">{{ count === 0 ? 'Direct Flight' : count + ' Stop' }}</label>
      </div>
      </div>
    </div>
  </div>
  <mat-divider></mat-divider>
  <div *ngIf="filterOptions.layoverDestinations?.length > 0" class="mb-3">
    <div class="section mb-3 mt-3">
      <span class="transfers">Layover Points</span>
    </div>
    <div *ngIf="isLayLoading" class="loading-spinner">
      <mat-spinner diameter="30"></mat-spinner>
    </div>
    <div *ngIf="!isLayLoading">
      <div *ngFor="let destination of filterOptions.layoverDestinations">
        <div
          class="form-check"
          style="display: flex; align-items: center; gap: 15px"
        >
        <mat-checkbox
        style="float: left; margin-left: -1.5em;"
        [value]="destination"
        [checked]="
          selectedFilters.layoverDestinations.includes(destination)
        "
        (change)="
          onFilterChange('layoverDestinations', destination, $event)
        "
        id="{{ destination }}"
      >
      </mat-checkbox>
          <span class="transfers">{{ fetchCityAndCountry(destination) }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
