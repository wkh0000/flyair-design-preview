<!-- Modal Container -->
<div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md mx-auto">

  <!-- Step 1: Select Payment Method -->
  <div *ngIf="currentStep === 1">
    <h2 class="text-xl font-semibold mb-1">Select payment method</h2>
    <p class="text-gray-500 text-sm mb-5">Preferred method with secure transactions.</p>

    <!-- Options -->
    <div class="space-y-3">
      <label class="flex items-center justify-between border rounded-md p-3 hover:border-blue-500 cursor-pointer">
        <div class="flex items-center space-x-3">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="w-8" />
          <span>Pay with Visa</span>
        </div>
        <input type="radio" name="payment" value="visa" class="form-radio accent-blue-500" />
      </label>
      <label class="flex items-center justify-between border rounded-md p-3 hover:border-blue-500 cursor-pointer">
        <div class="flex items-center space-x-3">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" class="w-8" />
          <span>Pay with Mastercard</span>
        </div>
        <input type="radio" name="payment" value="mastercard" class="form-radio accent-blue-500" />
      </label>
      <label class="flex items-center justify-between border-2 border-blue-400 rounded-md p-3 cursor-pointer">
        <div class="flex items-center space-x-3">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="w-8" />
          <span>Pay with PayPal</span>
        </div>
        <input type="radio" name="payment" value="paypal" class="form-radio accent-blue-500" checked />
      </label>
      <label class="flex items-center justify-between border rounded-md p-3 hover:border-blue-500 cursor-pointer">
        <div class="flex items-center space-x-3">
          <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="w-6" />
          <span>Pay with Apple Pay</span>
        </div>
        <input type="radio" name="payment" value="apple" class="form-radio accent-blue-500" />
      </label>
    </div>

    <!-- Buttons -->
    <div class="mt-6">
      <button (click)="goToStep(2)" class="bg-indigo-500 text-white px-4 py-2 rounded-md w-full">Continue</button>
      <button class="mt-3 w-full text-center border border-gray-300 rounded-md py-2">Go Back</button>
    </div>
  </div>

  <!-- Step 2: Payment Details -->
  <div *ngIf="currentStep === 2">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold">Payment details</h2>
      <button (click)="goToStep(1)">✕</button>
    </div>

    <form>
      <div class="mb-3">
        <label class="block text-sm mb-1">Name on card</label>
        <input type="text" value="Abigail Lorincz" class="w-full border rounded-md p-2" />
      </div>
      <div class="grid grid-cols-2 gap-4 mb-3">
        <div>
          <label class="block text-sm mb-1">Expiry</label>
          <input type="text" value="08 / 2024" class="w-full border rounded-md p-2" />
        </div>
        <div>
          <label class="block text-sm mb-1">CVV</label>
          <input type="password" value="•••" class="w-full border rounded-md p-2" />
        </div>
      </div>
      <div class="mb-3">
        <label class="block text-sm mb-1">Card number</label>
        <div class="flex items-center border rounded-md p-2 space-x-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" class="w-6" />
          <input type="text" value="1234 5678 9012 3456" class="w-full outline-none" />
        </div>
      </div>

      <label class="flex items-center mb-4">
        <input type="checkbox" class="mr-2" />
        <span class="text-sm">Enter a promo code</span>
      </label>

      <div class="text-sm text-gray-700 mb-4">
        <div class="flex justify-between"><span>Subtotal</span><span>$124.24</span></div>
        <div class="flex justify-between"><span>Sales tax</span><span>$7.45</span></div>
        <div class="flex justify-between font-bold"><span>Total</span><span>$131.69</span></div>
      </div>

      <button class="bg-blue-600 text-white w-full py-2 rounded-md" (click)="placeOrder()">Place your order</button>
      <p class="text-xs text-center mt-3 text-gray-500">
        Review the <a href="#" class="underline">terms and conditions</a>
      </p>
    </form>
  </div>
</div>
