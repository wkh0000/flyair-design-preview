<header class="fly-header" [class.on-dark]="onDark" [class.scrolled]="scrolled || !onDark">
  <div class="fly-container">
    <!-- Logo -->
    <a class="fly-logo" routerLink="/" aria-label="FlyAir — Fly your way">
      <img class="fly-logo-img light" src="assets/flyair-logo.png" alt="FlyAir" width="400" height="144" />
      <img class="fly-logo-img dark" src="assets/flyair-logo-dark.png" alt="" aria-hidden="true" width="400" height="144" />
    </a>

    <!-- Nav -->
    <nav class="fly-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <span class="fly-nav-ic fly-nav-ic-mask fly-nav-ic-flights" aria-hidden="true"></span>
        <span>Flights</span>
      </a>
      <a routerLink="/news" routerLinkActive="active">
        <svg class="fly-nav-ic" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h2"/>
          <path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/>
        </svg>
        <span>Newsroom</span>
      </a>
    </nav>

    <!-- Actions -->
    <div class="fly-actions">
      <!-- "Book now" jumps to the flight-search widget: smooth-scroll on the
           home page, navigate-then-scroll from any other route. -->
      <button type="button" class="fly-btn fly-btn-primary fly-btn-sm" (click)="bookNow()">Book now</button>
    </div>
  </div>
</header>
