<div class="cash-component" fxLayout="column">
  <div class="cash-content">
    <div *ngIf="isFormDisabled">
      <div class="search">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Filter</mat-label>
          <input
            matInput
            (keyup)="applyFilter($event)"
            placeholder="Search"
            #input
          />
        </mat-form-field>
      </div>

      <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
            <td mat-cell *matCellDef="let row">{{ row.id }}</td>
          </ng-container>

          <ng-container matColumnDef="pnr">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>PNR</th>
            <td mat-cell *matCellDef="let row">{{ row.pnr }}</td>
          </ng-container>

          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Amount</th>
            <td mat-cell *matCellDef="let row">{{ row.amount | currency }}</td>
          </ng-container>

          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
            <td mat-cell *matCellDef="let row">{{ row.date | date }}</td>
          </ng-container>

          <ng-container matColumnDef="discountApplied">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Discount Applied</th>
            <td mat-cell *matCellDef="let row">{{ row.discountApplied ? 'Yes' : 'No' }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let row">
              <button
                mat-icon-button
                color="primary"
                aria-label="Edit"
              >
                <span class="material-symbols-outlined"> edit_note </span>
              </button>
              <button
                mat-icon-button
                color="warn"
                aria-label="Delete"
              >
                <span class="material-symbols-outlined"> delete </span>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="6">
              No data matching the filter "{{ input.value }}"
            </td>
          </tr>
        </table>

        <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of cash records"></mat-paginator>
      </div>
    </div>
  </div>
</div>
