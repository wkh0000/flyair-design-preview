<div class="cash-component" fxLayout="column">
  <div class="cash-content">
    <div class="search">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Filter</mat-label>
        <input
          matInput
          (keyup)="applyFilter($event)"
          placeholder="Search"
          #input
        />
      </mat-form-field>
    </div>

    <div class="add-form mb-3">
      <mat-accordion>
        <mat-expansion-panel>
          <mat-expansion-panel-header>
            <mat-panel-title>
              Add New Content
            </mat-panel-title>
          </mat-expansion-panel-header>

          <form [formGroup]="blogForm" (ngSubmit)="onSubmit()">
            <div fxLayout="row" fxLayoutAlign="start center">

              <mat-form-field appearance="outline">
                <mat-label>Title</mat-label>
                <input matInput formControlName="title">
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>Subtitle</mat-label>
                <input matInput formControlName="description">
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>Price</mat-label>
                <input matInput type="number" formControlName="price">
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>Image</mat-label>
                <input type="text" [value]="selectedFileName" matInput disabled />
              </mat-form-field>

              <!-- File input outside matInput -->
              <input
                type="file"
                (change)="onFileSelected($event)"
                style="margin-top: 8px"
              />


              <div fxLayout="row" fxLayoutAlign="start center" style="margin-top: 20px;">
                <button mat-raised-button color="primary" type="submit" [disabled]="blogForm.invalid">Submit</button>
              </div>
            </div>
          </form>
        </mat-expansion-panel>
        </mat-accordion>
    </div>

    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource" matSort>
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let row">{{ row.id }}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
          <td mat-cell *matCellDef="let row">{{ row.title }}</td>
        </ng-container>

        <!-- Type Column (Tax, Total, Base) -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Description</th>
          <td mat-cell *matCellDef="let row">{{ row.description }}</td>
        </ng-container>

        <!-- Value Column -->
        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
          <td mat-cell *matCellDef="let row">{{ row.price | currency }}</td>
        </ng-container>

        <!-- Apply To Column -->
        <ng-container matColumnDef="imageUrl">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Image</th>
          <td mat-cell *matCellDef="let row">
            <img
            *ngIf="row.base64Image"
            [src]="row.base64Image"
            alt="Blog Image"
            style="width: 100px; height: auto;"
          />
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="warn" aria-label="Delete" (click)="DeleteLimit(row.id)">
              <span class="material-symbols-outlined"> delete </span>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="8">
            No data matching the filter.
          </td>
        </tr>
      </table>

      <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of cash records"></mat-paginator>
    </div>
  </div>
</div>
