<div class="profile-component" fxLayout="column">

  <div class="profile-content">
    <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="general-info grid-item">
        <h2>General Info</h2>

        <div class="image-form-container" fxLayout="row">
          <div class="image-box">
            <img src="../../../../assets/fav-logo-removebg-preview.png" alt="" />
          </div>

          <div class="form-box">
            <input type="hidden" formControlName="company_id" />
            <mat-label>Company Name</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="Company Name"
                type="text"
                formControlName="companyName"
              />
            </mat-form-field>

            <mat-label>Reg No</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="Reg No"
                type="text"
                formControlName="regNo"
              />
            </mat-form-field>

            <mat-label>IATA NO</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="IATA NO"
                type="text"
                formControlName="iata"
              />
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="contact-info grid-item">
        <h2>Contact Info</h2>

        <mat-label>Address</mat-label>
        <mat-form-field appearance="outline">
          <input
            matInput
            placeholder="Address"
            type="text"
            formControlName="address"
          />
        </mat-form-field>

        <div class="sub-fields" fxLayout="row">
          <div class="sub-column" fxLayout="column">
            <mat-label>City</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="City"
                type="text"
                formControlName="city"
              />
            </mat-form-field>
          </div>

          <div class="sub-column" fxLayout="column">
            <mat-label>District</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="District"
                type="text"
                formControlName="district"
              />
            </mat-form-field>
          </div>
        </div>

        <div class="sub-fields" fxLayout="row">


          <div class="sub-column" fxLayout="column">
            <mat-label>Country</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="Country"
                type="text"
                formControlName="country"
              />
            </mat-form-field>
          </div>
        </div>

        <div class="sub-fields" fxLayout="row">
          <div class="sub-column" fxLayout="column">
            <mat-label>Email</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="Email"
                type="text"
                formControlName="email"
              />
            </mat-form-field>
          </div>
          <div class="sub-column" fxLayout="column">
            <mat-label>Phone</mat-label>
            <mat-form-field appearance="outline">
              <input
                matInput
                placeholder="Phone"
                type="text"
                formControlName="phone"
              />
            </mat-form-field>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
